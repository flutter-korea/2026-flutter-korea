name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          # Serve the site from https://<user>.github.io/<repo>/.
          # Uses the repo name automatically, so this works on any fork.
          BASE_PATH: /${{ github.event.repository.name }}
        run: bun run build

      # --- Flutter Web port (served at <base>/flutter/, reached via
      # `?mode=flutter` — see the switch script in src/app.html) ---
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Keep in sync with the local toolchain (fvm, flutter/README.md).
          flutter-version: 3.38.3
          cache: true

      - name: Build Flutter web
        working-directory: flutter
        env:
          BASE_PATH: /${{ github.event.repository.name }}
        run: |
          flutter pub get
          flutter build web --release --base-href "${BASE_PATH}/flutter/"

      - name: Compose Pages artifact (SvelteKit + Flutter)
        run: |
          rm -rf build/flutter
          mkdir -p build/flutter
          cp -R flutter/build/web/. build/flutter/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
