<!doctype html>
<html lang="ko" class="no-js">
	<head>
		<meta charset="utf-8" />
		<script>
			// Framework switch: `?mode=flutter` serves the Flutter Web port,
			// deployed alongside this site under <base>/flutter/ (see deploy.yml).
			// SvelteKit is the default; `?mode=svelte` / `?mode=sveltekit` opt in
			// to it explicitly (the Flutter app honors them by redirecting back).
			// Runs first thing in <head> so the redirect happens before any paint.
			// `%sveltekit.assets%` resolves per-page ('.' from /, '..' from
			// /speakers/), so the target works locally, on Pages, and on forks.
			(function () {
				var mode = (new URLSearchParams(location.search).get('mode') || '').toLowerCase();
				if (mode !== 'flutter') return; // default & explicit svelte/sveltekit stay here
				var url = new URL('%sveltekit.assets%/flutter/', location.href);
				// The Flutter app routes with the URL hash.
				if (/\/speakers\/?$/.test(location.pathname)) url.hash = '#/speakers';
				location.replace(url);
			})();
		</script>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0a0e1a" />

		<!-- Primary meta -->
		<title>Flutter Korea 2026 — Back to Basics, Move Forward</title>
		<meta
			name="description"
			content="Flutter Korea 2026 · 2026.11.07 SAT · 기술의 본질로 돌아가, 두려움 없이 미래를 정의하다. Flutter Seoul이 주최하는 국내 최대 규모의 Flutter 커뮤니티 컨퍼런스."
		/>
		<meta name="author" content="Flutter Seoul" />

		<!-- Open Graph (absolute URLs — social crawlers don't resolve relative paths or SVG) -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Flutter Korea 2026" />
		<meta property="og:title" content="Flutter Korea 2026 — Back to Basics, Move Forward" />
		<meta
			property="og:description"
			content="2026.11.07 SAT · 기술의 본질로 돌아가, 두려움 없이 미래를 정의하다. Flutter Seoul 주최 컨퍼런스."
		/>
		<meta property="og:url" content="https://flutter-korea.github.io/2026-flutter-korea/" />
		<meta property="og:image" content="https://flutter-korea.github.io/2026-flutter-korea/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:locale" content="ko_KR" />
		<meta property="og:locale:alternate" content="en_US" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Flutter Korea 2026 — Back to Basics, Move Forward" />
		<meta
			name="twitter:description"
			content="2026.11.07 SAT · Flutter Seoul이 주최하는 Flutter 커뮤니티 컨퍼런스."
		/>
		<meta name="twitter:image" content="https://flutter-korea.github.io/2026-flutter-korea/og-image.png" />

		<!-- Fonts: Pretendard (KR/EN) self-hosted via jsDelivr, with system fallback -->
		<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
		/>

		<script>
			// Progressive-enhancement flag; lets CSS avoid a flash of un-animated content.
			document.documentElement.classList.remove('no-js');
			document.documentElement.classList.add('js');
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
