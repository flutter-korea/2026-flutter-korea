  <script>
    // Framework switch (counterpart of the script in the SvelteKit app.html):
    // this Flutter build is deployed under <base>/flutter/ next to the
    // SvelteKit site, which is the default. `?mode=svelte` / `?mode=sveltekit`
    // explicitly selects it, so redirect back up one level; `#/speakers` maps
    // to the SvelteKit /speakers/ route. Only acts in the composed deploy
    // (pathname ends in /flutter/).
    (function () {
      var mode = (new URLSearchParams(location.search).get('mode') || '').toLowerCase();
      if (mode !== 'svelte' && mode !== 'sveltekit') return;
      // Trailing slash required — servers redirect /flutter → /flutter/ with
      // the query intact, and '../' resolves correctly only from the slash form.
      if (!/\/flutter\/$/.test(location.pathname)) return;
      var target = location.hash.indexOf('#/speakers') === 0 ? '../speakers/' : '../';
      location.replace(new URL(target, location.href.split('#')[0]));
    })();
  </script>
